<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群聊聊天室</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== 登录/注册页 ===== */
        .auth-container {
            width: 400px;
            background: #16213e;
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }

        .auth-container h2 {
            text-align: center;
            color: #e94560;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .auth-container .subtitle {
            text-align: center;
            color: #667788;
            font-size: 13px;
            margin-bottom: 28px;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            border-radius: 8px;
            overflow: hidden;
            background: #0f3460;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-size: 14px;
            color: #8899aa;
            transition: all 0.2s;
        }
        .auth-tab.active {
            background: #e94560;
            color: #fff;
        }

        .auth-form { display: flex; flex-direction: column; gap: 14px; }
        .auth-form.hide { display: none; }

        .auth-form input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid #1a1a5e;
            background: #0f3460;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        .auth-form input:focus { border-color: #e94560; }

        .auth-form .btn-auth {
            padding: 12px;
            border: none;
            background: #e94560;
            color: #fff;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .auth-form .btn-auth:hover { background: #c0392b; }

        .auth-error {
            color: #e74c3c;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
        }

        /* ===== 聊天应用 ===== */
        .app {
            display: none;
            width: 1100px;
            height: 90vh;
            max-width: 100%;
            background: #16213e;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: #0f3460;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1a1a4e;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #1a1a5e;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h2 { font-size: 18px; color: #e94560; }

        .sidebar-header .logout-btn {
            font-size: 12px;
            color: #8899aa;
            cursor: pointer;
            padding: 4px 10px;
            border: 1px solid #444;
            border-radius: 6px;
            background: transparent;
        }
        .sidebar-header .logout-btn:hover { color: #e94560; border-color: #e94560; }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid #1a1a5e;
            font-size: 13px;
        }
        .user-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: #e94560;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px; font-weight: bold;
            color: #fff;
        }
        .user-role-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background: #f39c12;
            color: #000;
            margin-left: auto;
        }
        .user-role-badge.admin { background: #e94560; color: #fff; }

        .group-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .group-list::-webkit-scrollbar { width: 4px; }
        .group-list::-webkit-scrollbar-thumb { background: #e94560; border-radius: 4px; }

        .group-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
        }

        .group-item:hover { background: #1a1a5e; }
        .group-item.active { background: #e94560; }

        .group-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px; font-weight: bold;
            color: #fff; flex-shrink: 0;
        }

        .group-info { flex: 1; min-width: 0; }

        .group-name {
            font-size: 15px; font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .group-last-msg {
            font-size: 12px; color: #8899aa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .group-meta { text-align: right; flex-shrink: 0; }
        .group-time { font-size: 11px; color: #667788; }

        .sidebar-footer { padding: 12px 16px; border-top: 1px solid #1a1a5e; display: flex; gap: 8px; }

        .sidebar-footer button {
            flex: 1;
            padding: 10px 6px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-create-group {
            border: 2px dashed #e94560;
            background: transparent;
            color: #e94560;
        }
        .btn-create-group:hover { background: #e94560; color: #fff; }
        .btn-create-group:disabled {
            border-color: #444;
            color: #444;
            cursor: not-allowed;
        }

        .btn-admin-panel {
            border: 2px dashed #f39c12;
            background: transparent;
            color: #f39c12;
        }
        .btn-admin-panel:hover { background: #f39c12; color: #000; }
        .btn-admin-panel.hide { display: none; }

        .btn-join-group {
            border: 2px dashed #0abde3;
            background: transparent;
            color: #0abde3;
        }
        .btn-join-group:hover { background: #0abde3; color: #000; }

        /* ===== 聊天主区域 ===== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #1a1a4e;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-left { display: flex; align-items: center; gap: 12px; }
        .chat-header-left h3 { font-size: 17px; }
        .chat-header-left .member-count {
            font-size: 12px; color: #667788;
            cursor: pointer;
        }
        .chat-header-left .member-count:hover { color: #e94560; }

        .chat-header-right { display: flex; gap: 8px; }

        .chat-header-right button {
            padding: 6px 12px;
            border: 1px solid #1a1a5e;
            background: transparent;
            color: #8899aa;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .chat-header-right button:hover { background: #e94560; border-color: #e94560; color: #fff; }
        .chat-header-right button.danger:hover { background: #c0392b; border-color: #c0392b; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: #e94560; border-radius: 4px; }

        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 75%;
        }

        .msg-row.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px; font-weight: bold;
            color: #fff; flex-shrink: 0;
        }

        .msg-content { display: flex; flex-direction: column; }

        .msg-sender {
            font-size: 12px; color: #8899aa;
            margin-bottom: 3px;
        }
        .msg-row.mine .msg-sender { text-align: right; }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px; line-height: 1.5;
            word-break: break-word;
            background: #1a1a4e;
        }
        .msg-row.mine .msg-bubble { background: #e94560; }

        .msg-time {
            font-size: 11px; color: #667788;
            margin-top: 2px;
        }
        .msg-row.mine .msg-time { text-align: right; }

        .system-msg {
            text-align: center;
            font-size: 12px; color: #667788;
            padding: 4px 0;
        }

        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #445566;
        }
        .empty-chat .icon { font-size: 64px; margin-bottom: 16px; }
        .empty-chat p { font-size: 15px; }

        /* ===== 输入区 ===== */
        .input-area {
            padding: 12px 20px;
            border-top: 1px solid #1a1a4e;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #1a1a5e;
            background: #0f3460;
            color: #e0e0e0;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: inherit;
            max-height: 120px;
            line-height: 1.4;
        }

        .input-area textarea::placeholder { color: #445566; }

        .btn-send {
            width: 48px; height: 40px;
            border: none;
            background: #e94560;
            color: #fff;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .btn-send:hover { background: #c0392b; }

        /* ===== 模态框 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-overlay.show { display: flex; }

        .modal {
            background: #16213e;
            border-radius: 14px;
            padding: 24px;
            width: 480px;
            max-width: 92%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal.wide { width: 640px; }

        .modal h3 {
            color: #e94560;
            margin-bottom: 16px;
            font-size: 17px;
        }

        .modal label {
            display: block;
            font-size: 13px;
            color: #8899aa;
            margin-bottom: 4px;
        }

        .modal input, .modal select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #1a1a5e;
            background: #0f3460;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-actions button {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-cancel { background: #1a1a4e; color: #8899aa; }
        .btn-cancel:hover { background: #2a2a5e; }
        .btn-confirm { background: #e94560; color: #fff; }
        .btn-confirm:hover { background: #c0392b; }

        /* 管理面板表格 */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .admin-table th, .admin-table td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid #1a1a4e;
        }
        .admin-table th {
            color: #8899aa;
            font-weight: 500;
        }
        .admin-table .online-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }
        .online-dot.online { background: #2ecc71; }
        .online-dot.offline { background: #555; }

        .btn-sm {
            padding: 3px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-right: 4px;
        }
        .btn-danger-sm { background: #c0392b; color: #fff; }
        .btn-warn-sm { background: #f39c12; color: #000; }
        .btn-info-sm { background: #0abde3; color: #000; }

        /* 成员列表 */
        .member-list { display: flex; flex-direction: column; gap: 8px; }
        .member-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            background: #0f3460;
        }
        .member-row .status-text {
            margin-left: auto;
            font-size: 12px;
        }
        .status-text.online { color: #2ecc71; }
        .status-text.offline { color: #667788; }
    </style>
</head>
<body>

<!-- ===== 登录/注册页 ===== -->
<div class="auth-container" id="authContainer">
    <h2>群聊聊天室</h2>
    <p class="subtitle">多人实时群聊系统</p>
    <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">登 录</div>
        <div class="auth-tab" data-tab="register">注 册</div>
    </div>
    <div class="auth-form" id="formLogin">
        <input type="text" id="loginUsername" placeholder="用户名" maxlength="20" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="密码">
        <div class="auth-error" id="loginError"></div>
        <button class="btn-auth" id="btnLogin">登 录</button>
    </div>
    <div class="auth-form hide" id="formRegister">
        <input type="text" id="regUsername" placeholder="用户名（2-20个字符）" maxlength="20" autocomplete="off">
        <input type="password" id="regPassword" placeholder="密码（至少4个字符）">
        <input type="password" id="regPassword2" placeholder="确认密码">
        <div class="auth-error" id="regError"></div>
        <button class="btn-auth" id="btnRegister">注 册</button>
    </div>
</div>

<!-- ===== 聊天应用 ===== -->
<div class="app" id="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>群聊</h2>
            <button class="logout-btn" id="btnLogout">退出登录</button>
        </div>

        <div class="user-info">
            <div class="user-avatar" id="myAvatar"></div>
            <span id="myUsername"></span>
            <span class="user-role-badge" id="myRoleBadge"></span>
        </div>

        <div class="group-list" id="groupList"></div>

        <div class="sidebar-footer">
            <button class="btn-create-group" id="btnNewGroup">+ 创建群聊</button>
            <button class="btn-admin-panel hide" id="btnAdminPanel">管理</button>
            <button class="btn-join-group" id="btnJoinGroup">+ 加入群聊</button>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chatHeader" style="display:none;">
            <div class="chat-header-left">
                <h3 id="chatTitle"></h3>
                <span class="member-count" id="chatMemberCount"></span>
            </div>
            <div class="chat-header-right">
                <button id="btnLeaveGroup">退出群聊</button>
                <button id="btnClearChat">清空消息</button>
            </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area" id="inputArea" style="display:none;">
            <textarea id="msgInput" rows="1" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
            <button class="btn-send" id="btnSend">▶</button>
        </div>
    </div>
</div>

<!-- 群成员弹窗 -->
<div class="modal-overlay" id="modalMembers">
    <div class="modal">
        <h3 id="modalMembersTitle">群成员</h3>
        <div class="member-list" id="memberList"></div>
        <div class="modal-actions" style="margin-top:16px;">
            <button class="btn-cancel" id="btnCloseMembers">关闭</button>
        </div>
    </div>
</div>

<!-- 加入群聊弹窗 -->
<div class="modal-overlay" id="modalJoinGroup">
    <div class="modal">
        <h3>加入群聊</h3>
        <label>输入群聊 ID</label>
        <input type="text" id="inputJoinGroupId" placeholder="输入群聊 ID 加入">
        <div class="modal-actions">
            <button class="btn-cancel" id="btnCancelJoin">取消</button>
            <button class="btn-confirm" id="btnConfirmJoin">加入</button>
        </div>
    </div>
</div>

<!-- ROOT 管理面板 -->
<div class="modal-overlay" id="modalAdmin">
    <div class="modal wide">
        <h3>ROOT 管理面板</h3>

        <h4 style="color:#e94560;margin-bottom:8px;font-size:15px;">创建群聊</h4>
        <div style="display:flex;gap:10px;margin-bottom:16px;">
            <input type="text" id="inputAdminGroupName" placeholder="群聊名称" style="margin-bottom:0;">
            <button class="btn-confirm" id="btnAdminCreateGroup" style="white-space:nowrap;">创建</button>
        </div>

        <h4 style="color:#f39c12;margin-bottom:8px;font-size:15px;">用户管理</h4>
        <div style="max-height:300px;overflow-y:auto;">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th><th>用户名</th><th>密码(密文)</th><th>角色</th><th>状态</th><th>注册时间</th><th>操作</th>
                    </tr>
                </thead>
                <tbody id="adminUserTable"></tbody>
            </table>
        </div>
        <div class="modal-actions" style="margin-top:16px;">
            <button class="btn-cancel" id="btnCloseAdmin">关闭</button>
        </div>
    </div>
</div>

<script>
(function() {
    // ===== 全局状态 =====
    var token = localStorage.getItem('chat_token');
    var currentUser = null;
    var groups = [];
    var currentGroupId = null;
    var socket = null;
    var avatarColors = {};

    // ===== DOM 引用 =====
    var $authContainer = document.getElementById('authContainer');
    var $app = document.getElementById('app');
    var $groupList = document.getElementById('groupList');
    var $messages = document.getElementById('messages');
    var $chatHeader = document.getElementById('chatHeader');
    var $chatTitle = document.getElementById('chatTitle');
    var $chatMemberCount = document.getElementById('chatMemberCount');
    var $inputArea = document.getElementById('inputArea');
    var $msgInput = document.getElementById('msgInput');
    var $btnAdminPanel = document.getElementById('btnAdminPanel');
    var $btnNewGroup = document.getElementById('btnNewGroup');

    // ===== 工具函数 =====
    function getColor(str) {
        if (avatarColors[str]) return avatarColors[str];
        var colors = ['#e94560','#0abde3','#10ac84','#f368e0','#ff9f43','#6c5ce7','#00b894','#e17055','#a29bfe','#fd79a8'];
        var hash = 0;
        for (var i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        var c = colors[Math.abs(hash) % colors.length];
        avatarColors[str] = c;
        return c;
    }

    function formatTime(ts) {
        var d = new Date(ts);
        var pad = function(n) { return n < 10 ? '0' + n : n; };
        return pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    function formatDate(ts) {
        var d = new Date(ts);
        var now = new Date();
        if (d.toDateString() === now.toDateString()) return '今天';
        var yesterday = new Date(now);
        yesterday.setDate(yesterday.getDate() - 1);
        if (d.toDateString() === yesterday.toDateString()) return '昨天';
        return (d.getMonth() + 1) + '/' + d.getDate();
    }

    function escapeHtml(text) {
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ===== API 调用 =====
    function api(method, path, body) {
        var opts = {
            method: method,
            headers: { 'Content-Type': 'application/json' }
        };
        if (token) opts.headers['Authorization'] = 'Bearer ' + token;
        if (body) opts.body = JSON.stringify(body);

        return fetch('/api' + path, opts).then(function(r) { return r.json(); });
    }

    // ===== 登录/注册 =====
    function showLoginError(msg) { document.getElementById('loginError').textContent = msg; }
    function showRegError(msg) { document.getElementById('regError').textContent = msg; }

    function doLogin() {
        var username = document.getElementById('loginUsername').value.trim();
        var password = document.getElementById('loginPassword').value;
        if (!username || !password) { showLoginError('请输入用户名和密码'); return; }

        api('POST', '/auth/login', { username: username, password: password }).then(function(res) {
            if (res.code !== 200) { showLoginError(res.msg); return; }
            token = res.data.token;
            currentUser = res.data.user;
            localStorage.setItem('chat_token', token);
            connectAndEnter();
        });
    }

    function doRegister() {
        var username = document.getElementById('regUsername').value.trim();
        var password = document.getElementById('regPassword').value;
        var password2 = document.getElementById('regPassword2').value;

        if (!username || !password) { showRegError('请输入用户名和密码'); return; }
        if (username.length < 2) { showRegError('用户名至少2个字符'); return; }
        if (password.length < 4) { showRegError('密码至少4个字符'); return; }
        if (password !== password2) { showRegError('两次密码不一致'); return; }

        api('POST', '/auth/register', { username: username, password: password }).then(function(res) {
            if (res.code !== 200) { showRegError(res.msg); return; }
            token = res.data.token;
            currentUser = res.data.user;
            localStorage.setItem('chat_token', token);
            connectAndEnter();
        });
    }

    // ===== 进入聊天 =====
    function connectAndEnter() {
        $authContainer.style.display = 'none';
        $app.style.display = 'flex';

        document.getElementById('myAvatar').textContent = currentUser.username.charAt(0);
        document.getElementById('myUsername').textContent = currentUser.username;
        document.getElementById('myAvatar').style.background = getColor(currentUser.username);

        var badge = document.getElementById('myRoleBadge');
        if (currentUser.role === 'admin') {
            badge.textContent = 'ROOT';
            badge.classList.add('admin');
            $btnAdminPanel.classList.remove('hide');
        } else {
            badge.textContent = '用户';
            badge.classList.remove('admin');
            $btnAdminPanel.classList.add('hide');
        }

        // Socket.io 连接
        socket = io({
            auth: { token: token },
            reconnection: true
        });

        socket.on('connect', function() {
            console.log('[Socket] Connected');
            loadGroups();
        });

        socket.on('connect_error', function(err) {
            console.error('[Socket] Connection error:', err.message);
        });

        socket.on('new_message', function(msg) {
            if (currentGroupId && msg.group_id === currentGroupId) {
                appendMessage(msg);
                scrollToBottom();
            }
            // 刷新群列表以更新最后消息
            loadGroups();
        });

        socket.on('user_online', function(data) {
            loadGroups(); // 刷新成员在线状态
        });

        socket.on('group_update', function() {
            loadGroups();
        });

        socket.on('user_kicked', function(userId) {
            if (currentUser && currentUser.id === userId) {
                logout();
                alert('你已被 ROOT 账户移除');
            }
        });

        socket.on('user_joined_group', function() {
            loadGroups();
        });

        socket.on('user_left_group', function() {
            loadGroups();
        });
    }

    function logout() {
        if (socket) socket.disconnect();
        localStorage.removeItem('chat_token');
        token = null;
        currentUser = null;
        currentGroupId = null;
        groups = [];
        $app.style.display = 'none';
        $authContainer.style.display = 'block';
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
    }

    // ===== 加载群列表 =====
    function loadGroups() {
        api('GET', '/groups').then(function(res) {
            if (res.code !== 200) return;
            groups = res.data;
            renderGroupList();
            if (currentGroupId) {
                renderChat();
            }
        });
    }

    function renderGroupList() {
        if (groups.length === 0) {
            $groupList.innerHTML = '<div style="text-align:center;color:#667788;padding:40px 16px;font-size:14px;">还没有加入任何群聊</div>';
            return;
        }
        var html = '';
        groups.forEach(function(g) {
            var lastMsg = '';
            var lastTime = '';
            if (g.last_msg) {
                lastMsg = g.last_msg.username + ': ' + g.last_msg.text;
                lastTime = formatDate(g.last_msg.created_at) + ' ' + formatTime(g.last_msg.created_at);
            }
            var activeClass = g.id === currentGroupId ? ' active' : '';

            html += '<div class="group-item' + activeClass + '" data-gid="' + g.id + '">';
            html += '<div class="group-avatar" style="background:' + getColor(g.name) + ';">' + g.name.charAt(0) + '</div>';
            html += '<div class="group-info">';
            html += '<div class="group-name">' + escapeHtml(g.name) + '</div>';
            html += '<div class="group-last-msg">' + (lastMsg || '暂无消息') + '</div>';
            html += '</div>';
            html += '<div class="group-meta">';
            html += '<div class="group-time">' + lastTime + '</div>';
            html += '</div>';
            html += '</div>';
        });
        $groupList.innerHTML = html;
    }

    // ===== 聊天区 =====
    var msgCache = {}; // groupId → messages[]

    function switchGroup(gid) {
        if (currentGroupId === gid) return;
        if (currentGroupId && socket) {
            socket.emit('leave_group', currentGroupId);
        }
        currentGroupId = gid;
        if (socket) socket.emit('join_group', gid);
        renderGroupList();
        loadMessages(gid);
    }

    function loadMessages(gid) {
        api('GET', '/groups/' + gid + '/messages?limit=200').then(function(res) {
            if (res.code !== 200) return;
            msgCache[gid] = res.data;
            renderChat();
        });
    }

    function renderChat() {
        if (!currentGroupId) {
            $chatHeader.style.display = 'none';
            $inputArea.style.display = 'none';
            $messages.innerHTML = '<div class="empty-chat"><div class="icon">💬</div><p>选择一个群聊开始聊天</p></div>';
            return;
        }

        var group = groups.find(function(g) { return g.id === currentGroupId; });
        if (!group) {
            $chatHeader.style.display = 'none';
            $inputArea.style.display = 'none';
            $messages.innerHTML = '<div class="empty-chat"><p>你已不在该群聊中</p></div>';
            return;
        }

        $chatHeader.style.display = 'flex';
        $inputArea.style.display = 'flex';
        $chatTitle.textContent = group.name;
        $chatMemberCount.textContent = '(' + (group.member_count || '?') + '人)';
        $chatMemberCount.title = '点击查看群成员';

        var msgs = msgCache[currentGroupId] || [];
        if (msgs.length === 0) {
            $messages.innerHTML = '<div class="empty-chat"><p>暂无消息，发送第一条消息吧</p></div>';
        } else {
            var html = '';
            var lastDate = '';
            msgs.forEach(function(msg) {
                var msgDate = formatDate(msg.created_at);
                if (msgDate !== lastDate) {
                    html += '<div class="system-msg">—— ' + msgDate + ' ——</div>';
                    lastDate = msgDate;
                }
                html += buildMsgHtml(msg);
            });
            $messages.innerHTML = html;
        }
        scrollToBottom();
    }

    function appendMessage(msg) {
        // 避免重复
        var existing = $messages.querySelector('[data-msgid="' + msg.id + '"]');
        if (existing) return;

        // 加入缓存
        if (msgCache[currentGroupId]) {
            msgCache[currentGroupId].push(msg);
        }

        // 检查是否需要日期分隔
        var lastDateEl = $messages.querySelector('.system-msg:last-child');
        var msgDate = formatDate(msg.created_at);
        var html = '';
        if (!lastDateEl || lastDateEl.textContent.indexOf(msgDate) === -1) {
            html += '<div class="system-msg">—— ' + msgDate + ' ——</div>';
        }
        html += buildMsgHtml(msg);

        // 移除空状态
        var emptyEl = $messages.querySelector('.empty-chat');
        if (emptyEl) emptyEl.remove();

        $messages.insertAdjacentHTML('beforeend', html);
    }

    function buildMsgHtml(msg) {
        var isMine = msg.sender_id === (currentUser ? currentUser.id : null);
        var cls = isMine ? ' msg-row mine' : 'msg-row';
        var c = getColor(msg.username);
        return '<div class="' + cls + '" data-msgid="' + msg.id + '">' +
            '<div class="msg-avatar" style="background:' + c + ';">' + msg.username.charAt(0) + '</div>' +
            '<div class="msg-content">' +
            '<div class="msg-sender">' + escapeHtml(msg.username) + (msg.role === 'admin' ? ' [ROOT]' : '') + '</div>' +
            '<div class="msg-bubble">' + escapeHtml(msg.text) + '</div>' +
            '<div class="msg-time">' + formatTime(msg.created_at) + '</div>' +
            '</div>' +
            '</div>';
    }

    function scrollToBottom() {
        setTimeout(function() { $messages.scrollTop = $messages.scrollHeight; }, 50);
    }

    function sendMessage() {
        var text = $msgInput.value.trim();
        if (!text || !currentGroupId || !socket) return;

        socket.emit('send_message', { groupId: currentGroupId, text: text });
        $msgInput.value = '';
        $msgInput.style.height = 'auto';
    }

    // ===== 群成员弹窗 =====
    function showMembers() {
        if (!currentGroupId) return;
        api('GET', '/groups/' + currentGroupId + '/members').then(function(res) {
            if (res.code !== 200) return;
            document.getElementById('modalMembersTitle').textContent = '群成员 (' + res.data.length + '人)';
            var html = '';
            res.data.forEach(function(m) {
                var online = m.is_online === 1;
                html += '<div class="member-row">';
                html += '<div style="width:32px;height:32px;border-radius:50%;background:' + getColor(m.username) + ';display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;color:#fff;">' + m.username.charAt(0) + '</div>';
                html += '<div><div>' + escapeHtml(m.username) + (m.role === 'admin' ? ' [ROOT]' : '') + '</div></div>';
                html += '<span class="status-text ' + (online ? 'online' : 'offline') + '">' + (online ? '● 在线' : '○ 离线') + '</span>';
                html += '</div>';
            });
            document.getElementById('memberList').innerHTML = html;
            document.getElementById('modalMembers').classList.add('show');
        });
    }

    // ===== 群操作 =====
    function createGroup(name) {
        api('POST', '/groups', { name: name }).then(function(res) {
            if (res.code !== 200) { alert(res.msg); return; }
            loadGroups();
        });
    }

    function joinGroup(gid) {
        api('POST', '/groups/' + gid + '/join').then(function(res) {
            if (res.code !== 200) { alert(res.msg); return; }
            loadGroups();
        });
    }

    function leaveGroup() {
        if (!currentGroupId) return;
        var group = groups.find(function(g) { return g.id === currentGroupId; });
        if (!group) return;
        if (!confirm('确定要退出「' + group.name + '」吗？')) return;
        api('POST', '/groups/' + currentGroupId + '/leave').then(function(res) {
            if (res.code !== 200) { alert(res.msg); return; }
            if (socket) socket.emit('leave_group', currentGroupId);
            currentGroupId = null;
            delete msgCache[currentGroupId];
            loadGroups();
            renderChat();
            renderGroupList();
        });
    }

    // ===== 管理面板 =====
    function loadAdminPanel() {
        api('GET', '/admin/users').then(function(res) {
            if (res.code !== 200) { alert(res.msg); return; }
            var html = '';
            res.data.forEach(function(u) {
                var isOnline = u.is_online === 1;
                html += '<tr>';
                html += '<td>' + u.id + '</td>';
                html += '<td>' + escapeHtml(u.username) + '</td>';
                html += '<td style="font-size:11px;word-break:break-all;">' + escapeHtml(u.password.substring(0, 30)) + '...</td>';
                html += '<td>' + u.role + '</td>';
                html += '<td><span class="online-dot ' + (isOnline ? 'online' : 'offline') + '"></span>' + (isOnline ? '在线' : '离线') + '</td>';
                html += '<td>' + formatDate(u.created_at) + '</td>';
                html += '<td>';
                if (u.id !== currentUser.id) {
                    html += '<button class="btn-sm btn-warn-sm" onclick="(function(){ adminToggleRole(' + u.id + ', \'' + u.role + '\') })()">改角色</button>';
                    html += '<button class="btn-sm btn-danger-sm" onclick="(function(){ adminDeleteUser(' + u.id + ') })()">删除</button>';
                }
                html += '</td>';
                html += '</tr>';
            });
            document.getElementById('adminUserTable').innerHTML = html;
            document.getElementById('modalAdmin').classList.add('show');
        });
    }

    window.adminToggleRole = function(userId, currentRole) {
        var newRole = currentRole === 'admin' ? 'user' : 'admin';
        api('PUT', '/admin/users/' + userId + '/role', { role: newRole }).then(function(res) {
            if (res.code !== 200) { alert(res.msg); return; }
            loadAdminPanel();
        });
    };

    window.adminDeleteUser = function(userId) {
        if (!confirm('确定要删除该用户吗？')) return;
        api('DELETE', '/admin/users/' + userId).then(function(res) {
            if (res.code !== 200) { alert(res.msg); return; }
            loadAdminPanel();
        });
    };

    // ===== 事件绑定 =====

    // 登录/注册页
    document.getElementById('loginUsername').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doLogin();
    });
    document.getElementById('loginPassword').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doLogin();
    });
    document.getElementById('regPassword2').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doRegister();
    });
    document.getElementById('btnLogin').addEventListener('click', doLogin);
    document.getElementById('btnRegister').addEventListener('click', doRegister);

    document.querySelectorAll('.auth-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.auth-tab').forEach(function(t) { t.classList.remove('active'); });
            this.classList.add('active');
            var isLogin = this.getAttribute('data-tab') === 'login';
            document.getElementById('formLogin').classList.toggle('hide', !isLogin);
            document.getElementById('formRegister').classList.toggle('hide', isLogin);
            showLoginError('');
            showRegError('');
        });
    });

    // 退出登录
    document.getElementById('btnLogout').addEventListener('click', function() {
        logout();
    });

    // 群列表点击
    $groupList.addEventListener('click', function(e) {
        var item = e.target.closest('.group-item');
        if (!item) return;
        switchGroup(parseInt(item.getAttribute('data-gid')));
    });

    // 发送消息
    document.getElementById('btnSend').addEventListener('click', sendMessage);
    $msgInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    $msgInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // 群成员弹窗
    document.getElementById('chatMemberCount').addEventListener('click', showMembers);
    document.getElementById('btnCloseMembers').addEventListener('click', function() {
        document.getElementById('modalMembers').classList.remove('show');
    });
    document.getElementById('modalMembers').addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('show');
    });

    // 创建群聊
    $btnNewGroup.addEventListener('click', function() {
        var name = prompt('请输入群聊名称：');
        if (name && name.trim()) createGroup(name.trim());
    });

    // 如果是普通用户，创建按钮不可用（后端也会校验）
    // ROOT 面板由 ROOT 判断是否显示

    // 加入群聊
    document.getElementById('btnJoinGroup').addEventListener('click', function() {
        document.getElementById('modalJoinGroup').classList.add('show');
        document.getElementById('inputJoinGroupId').value = '';
        setTimeout(function() { document.getElementById('inputJoinGroupId').focus(); }, 100);
    });
    document.getElementById('btnCancelJoin').addEventListener('click', function() {
        document.getElementById('modalJoinGroup').classList.remove('show');
    });
    document.getElementById('btnConfirmJoin').addEventListener('click', function() {
        var gid = parseInt(document.getElementById('inputJoinGroupId').value.trim());
        if (!gid) { alert('请输入有效的群聊 ID'); return; }
        joinGroup(gid);
        document.getElementById('modalJoinGroup').classList.remove('show');
    });
    document.getElementById('modalJoinGroup').addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('show');
    });

    // 退出群聊
    document.getElementById('btnLeaveGroup').addEventListener('click', leaveGroup);

    // 清空消息（仅前端清空当前视图，不清数据库）
    document.getElementById('btnClearChat').addEventListener('click', function() {
        if (!currentGroupId) return;
        if (!confirm('确定要清空当前群聊的本地消息显示吗？（其他用户不受影响）')) return;
        delete msgCache[currentGroupId];
        renderChat();
    });

    // ROOT 管理面板
    $btnAdminPanel.addEventListener('click', loadAdminPanel);
    document.getElementById('btnCloseAdmin').addEventListener('click', function() {
        document.getElementById('modalAdmin').classList.remove('show');
    });
    document.getElementById('modalAdmin').addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('show');
    });

    document.getElementById('btnAdminCreateGroup').addEventListener('click', function() {
        var name = document.getElementById('inputAdminGroupName').value.trim();
        if (!name) { alert('请输入群聊名称'); return; }
        createGroup(name);
        document.getElementById('inputAdminGroupName').value = '';
    });

    // ===== 初始化 =====
    if (token) {
        // 验证 token 是否仍然有效
        api('GET', '/auth/me').then(function(res) {
            if (res.code === 200) {
                currentUser = res.data;
                connectAndEnter();
            } else {
                localStorage.removeItem('chat_token');
                token = null;
            }
        });
    }
})();
</script>
</body>
</html>
