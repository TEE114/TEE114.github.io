<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群聊聊天室</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            width: 1000px;
            height: 90vh;
            max-width: 100%;
            background: #16213e;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: #0f3460;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1a1a4e;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #1a1a5e;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h2 {
            font-size: 18px;
            color: #e94560;
        }

        .user-switcher {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid #1a1a5e;
        }

        .user-switcher label { font-size: 13px; color: #8899aa; white-space: nowrap; }

        .user-switcher select {
            flex: 1;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid #1a1a5e;
            background: #16213e;
            color: #e0e0e0;
            font-size: 13px;
            outline: none;
        }

        .group-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .group-list::-webkit-scrollbar { width: 4px; }
        .group-list::-webkit-scrollbar-thumb { background: #e94560; border-radius: 4px; }

        .group-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
        }

        .group-item:hover { background: #1a1a5e; }
        .group-item.active { background: #e94560; }

        .group-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
        }

        .group-info {
            flex: 1;
            min-width: 0;
        }

        .group-name {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .group-last-msg {
            font-size: 12px;
            color: #8899aa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .group-meta {
            text-align: right;
            flex-shrink: 0;
        }

        .group-time {
            font-size: 11px;
            color: #667788;
        }

        .badge {
            display: inline-block;
            background: #e94560;
            color: #fff;
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 10px;
            margin-top: 4px;
            min-width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid #1a1a5e;
        }

        .btn-new-group {
            width: 100%;
            padding: 10px;
            border: 2px dashed #e94560;
            background: transparent;
            color: #e94560;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-new-group:hover {
            background: #e94560;
            color: #fff;
        }

        /* ===== 聊天主区域 ===== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #1a1a4e;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-left h3 { font-size: 17px; }
        .chat-header-left span {
            font-size: 12px;
            color: #667788;
        }

        .chat-header-right {
            display: flex;
            gap: 8px;
        }

        .chat-header-right button {
            padding: 6px 12px;
            border: 1px solid #1a1a5e;
            background: transparent;
            color: #8899aa;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .chat-header-right button:hover {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
        }

        .chat-header-right button.danger:hover {
            background: #c0392b;
            border-color: #c0392b;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: #e94560; border-radius: 4px; }

        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 80%;
        }

        .msg-row.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
        }

        .msg-content { display: flex; flex-direction: column; }

        .msg-sender {
            font-size: 12px;
            color: #8899aa;
            margin-bottom: 4px;
        }

        .msg-row.mine .msg-sender { text-align: right; }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            background: #1a1a4e;
        }

        .msg-row.mine .msg-bubble {
            background: #e94560;
        }

        .msg-time {
            font-size: 11px;
            color: #667788;
            margin-top: 4px;
        }

        .msg-row.mine .msg-time { text-align: right; }

        .system-msg {
            text-align: center;
            font-size: 12px;
            color: #667788;
            padding: 4px 0;
        }

        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #445566;
        }

        .empty-chat .icon { font-size: 64px; margin-bottom: 16px; }
        .empty-chat p { font-size: 15px; }

        /* ===== 输入区 ===== */
        .input-area {
            padding: 12px 20px;
            border-top: 1px solid #1a1a4e;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #1a1a5e;
            background: #0f3460;
            color: #e0e0e0;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: inherit;
            max-height: 120px;
            line-height: 1.4;
        }

        .input-area textarea::placeholder { color: #445566; }

        .btn-send {
            width: 48px;
            height: 40px;
            border: none;
            background: #e94560;
            color: #fff;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .btn-send:hover { background: #c0392b; }

        /* ===== 模态框 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: #16213e;
            border-radius: 14px;
            padding: 24px;
            width: 380px;
            max-width: 90%;
        }

        .modal h3 {
            color: #e94560;
            margin-bottom: 16px;
            font-size: 17px;
        }

        .modal input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #1a1a5e;
            background: #0f3460;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-actions button {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-cancel { background: #1a1a4e; color: #8899aa; }
        .btn-cancel:hover { background: #2a2a5e; }
        .btn-confirm { background: #e94560; color: #fff; }
        .btn-confirm:hover { background: #c0392b; }

        .modal label {
            display: block;
            font-size: 13px;
            color: #8899aa;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="app">
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>群聊</h2>
        </div>

        <div class="user-switcher">
            <label>当前用户</label>
            <select id="userSelect"></select>
        </div>

        <div class="group-list" id="groupList"></div>

        <div class="sidebar-footer">
            <button class="btn-new-group" id="btnNewGroup">+ 创建新群聊</button>
        </div>
    </div>

    <!-- 聊天主区域 -->
    <div class="chat-area" id="chatArea">
        <div class="chat-header" id="chatHeader" style="display:none;">
            <div class="chat-header-left">
                <h3 id="chatTitle"></h3>
                <span id="chatMemberCount"></span>
            </div>
            <div class="chat-header-right">
                <button id="btnClearChat">清空消息</button>
                <button id="btnDeleteGroup" class="danger">删除群聊</button>
            </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area" id="inputArea" style="display:none;">
            <textarea id="msgInput" rows="1" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
            <button class="btn-send" id="btnSend">▶</button>
        </div>
    </div>
</div>

<!-- 新建群聊弹窗 -->
<div class="modal-overlay" id="modalNewGroup">
    <div class="modal">
        <h3>创建新群聊</h3>
        <label>群聊名称</label>
        <input type="text" id="inputGroupName" placeholder="请输入群聊名称" maxlength="20">
        <div class="modal-actions">
            <button class="btn-cancel" id="btnCancel">取消</button>
            <button class="btn-confirm" id="btnConfirm">创建</button>
        </div>
    </div>
</div>

<script>
(function() {
    // ===== 数据层 =====
    var STORAGE_KEY = 'chat_app_data';

    var DEFAULT_USERS = [
        { id: 'u1', name: '小明', color: '#e94560' },
        { id: 'u2', name: '小红', color: '#0abde3' },
        { id: 'u3', name: '小刚', color: '#10ac84' },
        { id: 'u4', name: '小丽', color: '#f368e0' },
        { id: 'u5', name: '小华', color: '#ff9f43' }
    ];

    var DEFAULT_GROUPS = [
        { id: 'g1', name: '技术交流群', color: '#e94560', members: [DEFAULT_USERS[0], DEFAULT_USERS[1], DEFAULT_USERS[2], DEFAULT_USERS[3]], messages: [] },
        { id: 'g2', name: '产品讨论组', color: '#0abde3', members: [DEFAULT_USERS[0], DEFAULT_USERS[1], DEFAULT_USERS[4]], messages: [] },
        { id: 'g3', name: '摸鱼小分队', color: '#10ac84', members: [DEFAULT_USERS[0], DEFAULT_USERS[2], DEFAULT_USERS[3], DEFAULT_USERS[4]], messages: [] }
    ];

    function loadData() {
        try {
            var raw = localStorage.getItem(STORAGE_KEY);
            if (raw) { return JSON.parse(raw); }
        } catch(e) {}
        return null;
    }

    function saveData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function initData() {
        var saved = loadData();
        if (saved && saved.groups && saved.groups.length > 0) {
            return saved;
        }
        var data = { groups: DEFAULT_GROUPS, currentUserId: 'u1', unreadMap: {} };
        saveData(data);
        return data;
    }

    var appData = initData();
    var groups = appData.groups;
    var currentUserId = appData.currentUserId;
    var currentGroupId = null;
    var unreadMap = appData.unreadMap || {};

    function persist() {
        appData.groups = groups;
        appData.currentUserId = currentUserId;
        appData.unreadMap = unreadMap;
        saveData(appData);
    }

    // ===== 工具函数 =====
    function getUser(id) {
        return DEFAULT_USERS.find(function(u) { return u.id === id; });
    }

    function getUserColor(uid) {
        var u = getUser(uid);
        return u ? u.color : '#999';
    }

    function getUserName(uid) {
        var u = getUser(uid);
        return u ? u.name : '未知';
    }

    function formatTime(ts) {
        var d = new Date(ts);
        var pad = function(n) { return n < 10 ? '0' + n : n; };
        return pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    function formatDate(ts) {
        var d = new Date(ts);
        var now = new Date();
        if (d.toDateString() === now.toDateString()) return '今天';
        var yesterday = new Date(now);
        yesterday.setDate(yesterday.getDate() - 1);
        if (d.toDateString() === yesterday.toDateString()) return '昨天';
        return (d.getMonth() + 1) + '/' + d.getDate();
    }

    function genId() {
        return 'm' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    }

    // ===== DOM 引用 =====
    var $groupList = document.getElementById('groupList');
    var $messages = document.getElementById('messages');
    var $msgInput = document.getElementById('msgInput');
    var $chatHeader = document.getElementById('chatHeader');
    var $chatTitle = document.getElementById('chatTitle');
    var $chatMemberCount = document.getElementById('chatMemberCount');
    var $inputArea = document.getElementById('inputArea');
    var $chatArea = document.getElementById('chatArea');
    var $userSelect = document.getElementById('userSelect');
    var $modalNewGroup = document.getElementById('modalNewGroup');
    var $inputGroupName = document.getElementById('inputGroupName');

    // ===== 渲染 =====
    function renderUserSelect() {
        var html = '';
        DEFAULT_USERS.forEach(function(u) {
            var sel = u.id === currentUserId ? ' selected' : '';
            html += '<option value="' + u.id + '"' + sel + '>' + u.name + '</option>';
        });
        $userSelect.innerHTML = html;
    }

    function renderGroupList() {
        if (groups.length === 0) {
            $groupList.innerHTML = '<div style="text-align:center;color:#667788;padding:40px 16px;font-size:14px;">还没有群聊，点击下方按钮创建一个吧</div>';
            return;
        }
        var html = '';
        groups.forEach(function(g) {
            var lastMsg = '';
            var lastTime = '';
            if (g.messages.length > 0) {
                var last = g.messages[g.messages.length - 1];
                lastMsg = getUserName(last.senderId) + ': ' + last.text;
                lastTime = formatDate(last.timestamp) + ' ' + formatTime(last.timestamp);
            }
            var unread = unreadMap[g.id] || 0;
            var badge = unread > 0 ? '<div class="badge">' + (unread > 99 ? '99+' : unread) + '</div>' : '';
            var activeClass = g.id === currentGroupId ? ' active' : '';

            html += '<div class="group-item' + activeClass + '" data-gid="' + g.id + '">';
            html += '<div class="group-avatar" style="background:' + g.color + ';">' + g.name.charAt(0) + '</div>';
            html += '<div class="group-info">';
            html += '<div class="group-name">' + g.name + '</div>';
            html += '<div class="group-last-msg">' + (lastMsg || '暂无消息') + '</div>';
            html += '</div>';
            html += '<div class="group-meta">';
            html += '<div class="group-time">' + lastTime + '</div>';
            html += badge;
            html += '</div>';
            html += '</div>';
        });
        $groupList.innerHTML = html;
    }

    function renderChat() {
        if (!currentGroupId) {
            $chatHeader.style.display = 'none';
            $inputArea.style.display = 'none';
            $messages.innerHTML = '<div class="empty-chat"><div class="icon">💬</div><p>选择一个群聊开始聊天</p></div>';
            return;
        }

        var group = groups.find(function(g) { return g.id === currentGroupId; });
        if (!group) {
            currentGroupId = null;
            renderChat();
            renderGroupList();
            return;
        }

        $chatHeader.style.display = 'flex';
        $inputArea.style.display = 'flex';
        $chatTitle.textContent = group.name;
        $chatMemberCount.textContent = group.members.length + 1 + ' 位成员';

        // 清除该群的未读
        unreadMap[currentGroupId] = 0;
        persist();
        renderGroupList();

        if (group.messages.length === 0) {
            $messages.innerHTML = '<div class="empty-chat"><p>暂无消息，发送第一条消息吧</p></div>';
        } else {
            var html = '';
            var lastDate = '';
            group.messages.forEach(function(msg) {
                var msgDate = formatDate(msg.timestamp);
                if (msgDate !== lastDate) {
                    html += '<div class="system-msg">—— ' + msgDate + ' ——</div>';
                    lastDate = msgDate;
                }
                var isMine = msg.senderId === currentUserId;
                html += '<div class="msg-row' + (isMine ? ' mine' : '') + '">';
                html += '<div class="msg-avatar" style="background:' + getUserColor(msg.senderId) + ';">' + getUserName(msg.senderId).charAt(0) + '</div>';
                html += '<div class="msg-content">';
                html += '<div class="msg-sender">' + getUserName(msg.senderId) + '</div>';
                html += '<div class="msg-bubble">' + escapeHtml(msg.text) + '</div>';
                html += '<div class="msg-time">' + formatTime(msg.timestamp) + '</div>';
                html += '</div>';
                html += '</div>';
            });
            $messages.innerHTML = html;
        }
        scrollToBottom();
    }

    function scrollToBottom() {
        setTimeout(function() {
            $messages.scrollTop = $messages.scrollHeight;
        }, 50);
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function refreshAll() {
        renderUserSelect();
        renderGroupList();
        renderChat();
    }

    // ===== 操作 =====
    function switchGroup(gid) {
        if (currentGroupId === gid) return;
        // 记录离开群聊时的未读归零会在 renderChat 里处理
        currentGroupId = gid;
        renderChat();
        renderGroupList();
        persist();
    }

    function sendMessage() {
        var text = $msgInput.value.trim();
        if (!text || !currentGroupId) return;

        var group = groups.find(function(g) { return g.id === currentGroupId; });
        if (!group) return;

        var msg = {
            id: genId(),
            senderId: currentUserId,
            text: text,
            timestamp: Date.now()
        };
        group.messages.push(msg);

        // 给其他群成员增加未读（这里简化：不在当前群的人 +1）
        // 实际不做模拟"其他用户登录"，所以未读仅用于视觉
        // 但如果切换用户后再切回来，未读就从 persist 恢复了

        $msgInput.value = '';
        $msgInput.style.height = 'auto';
        persist();
        renderChat();
        renderGroupList();
    }

    // 模拟机器人自动回复
    function autoReply(group) {
        var botMember = group.members.find(function(m) { return m.id !== currentUserId; });
        if (!botMember) return;
        var replies = [
            '有道理！', '赞同 +1', '这个想法不错', '我来看看',
            '哈哈哈哈哈', '👍', '稍等一下，我去确认', '收到！',
            '这个之前讨论过，可以翻一下记录', '辛苦啦～'
        ];
        var msg = {
            id: genId(),
            senderId: botMember.id,
            text: replies[Math.floor(Math.random() * replies.length)],
            timestamp: Date.now() + 1000
        };
        group.messages.push(msg);
        // 未读 +1（如果不在当前群）
        if (group.id !== currentGroupId) {
            unreadMap[group.id] = (unreadMap[group.id] || 0) + 1;
        }
        persist();
        renderChat();
        renderGroupList();
    }

    function createGroup(name) {
        var colors = ['#e94560','#0abde3','#10ac84','#f368e0','#ff9f43','#6c5ce7','#00b894'];
        var group = {
            id: 'g' + Date.now(),
            name: name,
            color: colors[Math.floor(Math.random() * colors.length)],
            members: [getUser(currentUserId)],
            messages: []
        };
        groups.push(group);
        persist();
        refreshAll();
        switchGroup(group.id);
    }

    function deleteGroup(gid) {
        groups = groups.filter(function(g) { return g.id !== gid; });
        delete unreadMap[gid];
        if (currentGroupId === gid) {
            currentGroupId = groups.length > 0 ? groups[0].id : null;
        }
        persist();
        refreshAll();
    }

    function clearChat(gid) {
        var group = groups.find(function(g) { return g.id === gid; });
        if (!group) return;
        group.messages = [];
        persist();
        renderChat();
        renderGroupList();
    }

    // ===== 事件绑定 =====
    $groupList.addEventListener('click', function(e) {
        var item = e.target.closest('.group-item');
        if (!item) return;
        var gid = item.getAttribute('data-gid');
        switchGroup(gid);
    });

    $userSelect.addEventListener('change', function() {
        currentUserId = this.value;
        persist();
        refreshAll();
    });

    document.getElementById('btnSend').addEventListener('click', sendMessage);

    $msgInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    $msgInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    document.getElementById('btnNewGroup').addEventListener('click', function() {
        $modalNewGroup.classList.add('show');
        $inputGroupName.value = '';
        setTimeout(function() { $inputGroupName.focus(); }, 100);
    });

    document.getElementById('btnCancel').addEventListener('click', function() {
        $modalNewGroup.classList.remove('show');
    });

    document.getElementById('btnConfirm').addEventListener('click', function() {
        var name = $inputGroupName.value.trim();
        if (!name) { alert('请输入群聊名称'); return; }
        createGroup(name);
        $modalNewGroup.classList.remove('show');
    });

    $inputGroupName.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('btnConfirm').click();
        }
    });

    $modalNewGroup.addEventListener('click', function(e) {
        if (e.target === $modalNewGroup) {
            $modalNewGroup.classList.remove('show');
        }
    });

    document.getElementById('btnClearChat').addEventListener('click', function() {
        if (!currentGroupId) return;
        if (confirm('确定要清空当前群聊的所有消息吗？此操作不可撤销。')) {
            clearChat(currentGroupId);
        }
    });

    document.getElementById('btnDeleteGroup').addEventListener('click', function() {
        if (!currentGroupId) return;
        var group = groups.find(function(g) { return g.id === currentGroupId; });
        if (!group) return;
        if (confirm('确定要删除「' + group.name + '」吗？此操作不可撤销。')) {
            deleteGroup(currentGroupId);
        }
    });

    // 模拟自动回复：每 15 秒随机一个群有机器人发言
    setInterval(function() {
        if (groups.length === 0) return;
        // 随机选一个群
        var g = groups[Math.floor(Math.random() * groups.length)];
        autoReply(g);
    }, 15000);

    // ===== 初始化 =====
    if (groups.length > 0) {
        currentGroupId = groups[0].id;
    }
    refreshAll();
})();
</script>
</body>
</html>
